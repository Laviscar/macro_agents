# FRED 硬宏观数据序列 → 节点映射(node_id 有=映射到图节点;无=通用宏观读数)
# 申请免费 key: https://fredaccount.stlouisfed.org/apikeys ,填 FRED_API_KEY
series:
  - {series_id: DGS10,        label: "美债10Y名义",    unit: "%",     node_id: US10Y}
  - {series_id: DGS2,         label: "美债2Y",         unit: "%",     node_id: US2Y}
  - {series_id: T10Y2Y,       label: "10Y-2Y利差",     unit: "%",     node_id: 2Y10Y}
  - {series_id: BAMLH0A0HYM2, label: "高收益OAS利差",  unit: "%",     node_id: HY_Spread}
  - {series_id: DTWEXBGS,     label: "贸易加权美元",   unit: "index", node_id: DXY}
  - {series_id: VIXCLS,       label: "VIX",            unit: "index", node_id: VIX}
  - {series_id: DFII10,       label: "10Y实际利率",    unit: "%",     node_id: 实际利率}
  - {series_id: T10YIE,       label: "10Y通胀预期",    unit: "%",     node_id: 通胀预期}
  - {series_id: DFF,          label: "联邦基金利率",   unit: "%",     node_id: 政策利率}
  # --- 通用宏观读数(无对应节点,作委员会背景) ---
  - {series_id: UNRATE,       label: "失业率",         unit: "%"}
  - {series_id: CPIAUCSL,     label: "CPI水平",        unit: "index"}
  - {series_id: PAYEMS,       label: "非农就业",       unit: "千人"}
  - {series_id: GDPC1,        label: "实际GDP",        unit: "bil$"}
